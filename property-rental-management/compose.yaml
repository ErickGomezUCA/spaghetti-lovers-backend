services:
  spaghetti-lovers-db:
    image: postgres:18.4
    container_name: spaghetti-lovers-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: spaghetti-lovers-db
    volumes:
      - pgdata:/var/lib/postgresql/18/docker
    restart: unless-stopped

volumes:
  pgdata:
    driver: local
