<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 12px;
            color: #333;
        }

        h1 {
            text-align: center;
            font-size: 18px;
        }

        .section {
            margin-top: 20px;
        }

        .label {
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        td, th {
            border: 1px solid #ccc;
            padding: 6px;
            text-align: left;
        }
    </style>
</head>
<body>
<h1>Contrato de Arrendamiento</h1>

<div class="section">
    <p><span class="label">Propiedad:</span> <span th:text="${propertyTitle}">-</span></p>
    <p><span class="label">Dirección:</span> <span th:text="${propertyAddress}">-</span></p>
    <p><span class="label">Arrendador:</span> <span th:text="${landlordName}">-</span></p>
    <p><span class="label">Inquilino:</span> <span th:text="${tenantName}">-</span></p>
</div>

<div class="section">
    <table>
        <tr>
            <th>Concepto</th>
            <th>Detalle</th>
        </tr>
        <tr>
            <td>Check-in</td>
            <td th:text="${checkInDate}">-</td>
        </tr>
        <tr>
            <td>Check-out</td>
            <td th:text="${checkOutDate}">-</td>
        </tr>
        <tr>
            <td>Noches totales</td>
            <td th:text="${totalNights}">-</td>
        </tr>
        <tr>
            <td>Precio base</td>
            <td th:text="${baseTotal}">-</td>
        </tr>
        <tr>
            <td>Tarifa de limpieza</td>
            <td th:text="${cleaningFee}">-</td>
        </tr>
        <tr>
            <td>Depósito de garantía</td>
            <td th:text="${securityDeposit}">-</td>
        </tr>
        <tr>
            <td>Penalización por cancelación</td>
            <td th:text="${cancellationPenalty}">-</td>
        </tr>
        <tr>
            <td>Total</td>
            <td th:text="${totalPrice}">-</td>
        </tr>
    </table>
</div>

<div class="section">
    <p class="label">Reglas de la propiedad:</p>
    <p th:text="${rules}">-</p>
</div>

<div class="section">
    <p>Generado el <span th:text="${generatedAt}">-</span></p>
</div>
</body>
</html>
