spring:
  application:
    name: property-rental-management

  datasource:
    url: "${POSTGRES_URL}"
    username: "${POSTGRES_USER}"
    password: "${POSTGRES_PASSWORD}"
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

server:
  port: 8080

jwt:
  secret: "${JWT_SECRET}"
  expiration-ms: "${JWT_EXPIRATION_MS:86400000}"

